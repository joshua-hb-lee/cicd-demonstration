- name: "[Blue Green] Init BLUE/GREEN group files"
  ansible.builtin.include_tasks:
    file: check_file.yml
    apply:
      tags:
        - blue_green
  loop:
    - BLUE
    - GREEN

- name: "[Blue Green] Copy the script file to remote server"
  ansible.builtin.template:
    src: blue-green-deploy.sh.j2
    dest: "{{ remote_app_path }}/service.sh"
    owner: "{{ remote_server_user }}"
    group: "{{ remote_server_group }}"
    mode: 0755

- name: "[Blue Green] Run service script"
  ansible.builtin.include_tasks:
    file: deploy.yml
    apply:
      tags:
        - blue_green
